version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edge_net

  central-node:
    build:
      context: .
      dockerfile: Dockerfile.edge
    entrypoint: ["python", "-m", "src.central_node"]
    ports:
      - "8001:8001"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - BIND_HOST=0.0.0.0
      - BIND_PORT=8001
    depends_on:
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    networks:
      - edge_net

  edge-node-1:
    build:
      context: .
      dockerfile: Dockerfile.edge
    environment:
      - NODE_ID=edge-node-1
      - CENTRAL_NODE_URL=http://central-node:8001
    depends_on:
      - central-node
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    networks:
      - edge_net

  edge-node-2:
    build:
      context: .
      dockerfile: Dockerfile.edge
    environment:
      - NODE_ID=edge-node-2
      - CENTRAL_NODE_URL=http://central-node:8001
    depends_on:
      - central-node
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    networks:
      - edge_net

  edge-node-3:
    build:
      context: .
      dockerfile: Dockerfile.edge
    environment:
      - NODE_ID=edge-node-3
      - CENTRAL_NODE_URL=http://central-node:8001
    depends_on:
      - central-node
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    networks:
      - edge_net

volumes:
  qdrant_data:

networks:
  edge_net:
    driver: bridge
